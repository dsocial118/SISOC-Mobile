name: sisoc-mobile

services:
  frontend:
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:-22.14.0}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_PUBLIC_BASE_PATH: ${VITE_PUBLIC_BASE_PATH:-/mobile/}
    image: sisoc-mobile-frontend:${IMAGE_TAG:-latest}
