# Ajusta dominio, certificado y backend antes de usarlo en produccion.
# Este archivo representa el nginx del servidor/host, no el nginx interno del contenedor.

upstream sisoc_mobile_frontend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream sisoc_mobile_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name TU_DOMINIO;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name TU_DOMINIO;

    ssl_certificate /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /mobile/ {
        proxy_pass http://sisoc_mobile_frontend/;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://sisoc_mobile_backend;
        proxy_read_timeout 60s;
    }
}
